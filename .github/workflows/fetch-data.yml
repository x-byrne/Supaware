name: Fetch Data
on:
  schedule:
    - cron: '0 0 * * *' # Daily
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions: 
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Fetch CSV
        run: |
          curl -L "https://aware.com.au/bin/unitPriceExport?category=FUTURE_SAVER" -o data.csv
      - name: Commit and Push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.csv
          git commit -m "Update data" || echo "No changes"
          git push
      - name: Purge jsDelivr cache
        run: |
          curl -X PURGE "https://purge.jsdelivr.net/gh/x-byrne/Supaware/data.csv"
